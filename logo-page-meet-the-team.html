<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWC – Meet the Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      padding-left: 0;
      min-height: 100vh;
      background: #fff;
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    }

    .gwc-logo {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      user-select: none;
    }

    .gwc-acronym {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -3px;
      color: #1a1a1a;
      line-height: 1;
    }
    .gwc-acronym .red { color: #b22222; }

    .gwc-rule {
      width: 100%;
      height: 3px;
      background: #b22222;
      border-radius: 2px;
    }

    /* ── Page title ──────────────────────────────────────────────────── */
    .gwc-slogan {
      margin-top: 10px;
      display: flex;
      align-items: baseline;
      gap: 14px;
      line-height: 1;
      overflow: hidden;
    }

    /* static word — no animation, just visible */
    .gwc-static {
      font-size: 38px;
      font-weight: 700;
      color: #1a1a1a;
      white-space: nowrap;
    }

    /* page word: drifts in gently, breathes, dissolves, pauses, repeats */
    .gwc-word {
      font-size: 48px;
      font-weight: 900;
      color: #b22222;
      white-space: nowrap;
      opacity: 0;
      transform: translateX(-18px);
      /*
        11s cycle:
        0→27%  drift in  (3s) — ease-out feel via keyframe spacing
        27→73% hold       (5s)
        73→86% dissolve   (1.5s)
        86→100% pause     (1.5s, reset off-screen)
      */
      animation: wordLoop 11s linear 0.5s infinite;
    }

    @keyframes wordLoop {
      0%   { opacity: 0;   transform: translateX(-18px); animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
      27%  { opacity: 1;   transform: translateX(0);     animation-timing-function: linear; }
      73%  { opacity: 1;   transform: translateX(0);     animation-timing-function: cubic-bezier(0.4, 0, 1, 1); }
      86%  { opacity: 0;   transform: translateX(10px);  animation-timing-function: linear; }
      87%  { opacity: 0;   transform: translateX(-18px); }
      100% { opacity: 0;   transform: translateX(-18px); }
    }

    /* ── Wordmark ────────────────────────────────────────────────────── */
    .gwc-wordmark {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .gwc-fullname {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #555;
    }

    .gwc-tagline {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="gwc-logo">
    <div class="gwc-acronym"><span class="red">G</span>WC</div>
    <div class="gwc-rule"></div>
    <div class="gwc-slogan">
      <span class="gwc-static">Our</span>
      <span class="gwc-word">Team</span>
    </div>
    <div class="gwc-wordmark">
      <div class="gwc-fullname">Global Workforce Community</div>
      <div class="gwc-tagline">A Works Council That Stands for You</div>
    </div>
  </div>
</body>
</html>
