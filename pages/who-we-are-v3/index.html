    CANDIDATES.forEach(([name, role, docId, viewId]) => {
      const scene = document.createElement('div');
      scene.className = 'card-scene';

      const inner = document.createElement('div');
      inner.className = 'card-inner';

      // ── FRONT ──
      const front = document.createElement('div');
      front.className = 'card-front';

      if (docId) {
        const img = document.createElement('img');
        img.className = 'card-photo';
        img.src = BASE_IMG + docId + '?type=XL';
        img.alt = name;
        front.appendChild(img);
      } else {
        const ini = document.createElement('div');
        ini.className = 'card-initials';
        ini.textContent = initials(name);
        front.appendChild(ini);
      }

      const info = document.createElement('div');
      info.className = 'card-info';
      info.innerHTML = `<div class="card-name">${escHtml(name)}</div><div class="card-role">${escHtml(role)}</div>`;
      front.appendChild(info);

      const foil = document.createElement('div');
      foil.className = 'card-foil';
      front.appendChild(foil);

      // ── BACK — hidden until card flips ──
      const back = document.createElement('div');
      back.className = 'card-back face-hidden';

      back.innerHTML = `
        <div class="back-header">
          <div class="back-name">${escHtml(name)}</div>
          <div class="back-role">${escHtml(role)}</div>
        </div>`;

      const intro = INTROS[name];
      if (intro) {
        const introEl = document.createElement('div');
        introEl.className = 'back-intro';
        introEl.textContent = intro;
        back.appendChild(introEl);
      } else {
        const noIntro = document.createElement('div');
        noIntro.className = 'back-no-intro';
        noIntro.textContent = 'Introduction coming soon…';
        back.appendChild(noIntro);
      }

      if (viewId) {
        const footer = document.createElement('div');
        footer.className = 'back-footer';
        footer.innerHTML = `<a class="back-link" href="${BASE_VIEW}${viewId}" target="_top">Meet me on Zlife ↗</a>`;
        back.appendChild(footer);
      }

      inner.appendChild(front);
      inner.appendChild(back);
      scene.appendChild(inner);
      grid.appendChild(scene);

      // ── 3D tilt on hover (only when not inspecting) ──
      const MAX_TILT = 16;
      scene.addEventListener('mousemove', e => {
        if (isInspecting) return;
        const rect = inner.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top  + rect.height / 2;
        const dx = (e.clientX - cx) / (rect.width / 2);
        const dy = (e.clientY - cy) / (rect.height / 2);
        const angle = (Math.atan2(dy, dx) * 180 / Math.PI + 180).toFixed(1) + 'deg';
        inner.style.transform = `perspective(900px) rotateX(${(-dy * MAX_TILT).toFixed(2)}deg) rotateY(${(dx * MAX_TILT).toFixed(2)}deg) translateZ(20px) scale3d(1.05,1.05,1.05)`;
        front.style.setProperty('--angle', angle);
      });

      scene.addEventListener('mouseleave', () => {
        if (!isInspecting) inner.style.transform = '';
      });

      // ── Click to inspect ──
      scene.addEventListener('click', () => {
        if (isInspecting) { closeInspect(); return; }
        openInspect(scene, inner);
      });
    });

    // ── Inspect logic ────────────────────────────────────────────────────
    // Strategy: physically move the real scene element into fixed position
    // (no clone = no image reload = no black frames, no font jump)
    const overlay = document.getElementById('inspect-overlay');
    let isInspecting = false;
    let activeScene  = null;
    let placeholder  = null;

    // ── Inspect tilt handler (lives on window while a card is open) ──
    const MAX_INSPECT_TILT = 12;
    function onInspectMouseMove(e) {
      if (!activeScene) return;
      const inner = activeScene.querySelector('.card-inner');
      const front = activeScene.querySelector('.card-front');
      const rect  = activeScene.getBoundingClientRect();
      const cx = rect.left + rect.width  / 2;
      const cy = rect.top  + rect.height / 2;
      const dx = (e.clientX - cx) / (rect.width  / 2);
      const dy = (e.clientY - cy) / (rect.height / 2);
      // Clamp so tilt doesn't go wild when mouse is far outside card
      const cdx = Math.max(-1, Math.min(1, dx));
      const cdy = Math.max(-1, Math.min(1, dy));
      const angle = (Math.atan2(cdy, cdx) * 180 / Math.PI + 180).toFixed(1) + 'deg';

      inner.style.transform = `perspective(1200px) rotateX(${(-cdy * MAX_INSPECT_TILT).toFixed(2)}deg) rotateY(${(180 + cdx * MAX_INSPECT_TILT).toFixed(2)}deg) translateZ(10px)`;

      if (front) {
        front.style.setProperty('--angle', angle);
      }
    }

    function openInspect(scene, inner) {
      isInspecting = true;
      activeScene  = scene;

      inner.style.transition = '';
      inner.style.transform  = '';

      const rect = scene.getBoundingClientRect();

      placeholder = document.createElement('div');
      placeholder.className = 'card-placeholder';
      scene.parentNode.insertBefore(placeholder, scene);

      scene.style.cssText = `
        position: fixed;
        left: ${rect.left}px;
        top: ${rect.top}px;
        width: ${rect.width}px;
        height: ${rect.height}px;
        z-index: 1001;
        margin: 0;
        transition: left 0.6s cubic-bezier(0.4,0,0.15,1),
                    top 0.6s cubic-bezier(0.4,0,0.15,1),
                    width 0.6s cubic-bezier(0.4,0,0.15,1),
                    height 0.6s cubic-bezier(0.4,0,0.15,1);
        box-shadow: none;
        cursor: pointer;
      `;
      scene.classList.add('inspecting');

      inner.style.transition = 'transform 0.6s cubic-bezier(0.4,0,0.15,1)';

      overlay.classList.add('active');

      requestAnimationFrame(() => requestAnimationFrame(() => {
        const TW = Math.min(320, window.innerWidth * 0.85);
        const TH = TW * 1.5;
        scene.style.left      = `${(window.innerWidth  - TW) / 2}px`;
        scene.style.top       = `${(window.innerHeight - TH) / 2}px`;
        scene.style.width     = `${TW}px`;
        scene.style.height    = `${TH}px`;
        scene.style.boxShadow = 'none';

        inner.style.transform = 'perspective(900px) rotateY(180deg)';

        // At flip midpoint: hide front, reveal back
        const backEl  = scene.querySelector('.card-back');
        const frontEl = scene.querySelector('.card-front');
        setTimeout(() => {
          if (frontEl) frontEl.classList.add('face-hidden');
          if (backEl)  backEl.classList.remove('face-hidden');
        }, 300);

        // Attach tilt handler after fly animation completes
        setTimeout(() => {
          inner.style.transition = 'transform 0.08s linear';
          window.addEventListener('mousemove', onInspectMouseMove);
        }, 650);
      }));
    }

    function closeInspect() {
      if (!isInspecting || !activeScene) return;

      window.removeEventListener('mousemove', onInspectMouseMove);

      const scene = activeScene;
      const inner = scene.querySelector('.card-inner');

      const rect2 = placeholder.getBoundingClientRect();

      scene.style.transition = `left 0.5s cubic-bezier(0.4,0,0.15,1),
                                 top 0.5s cubic-bezier(0.4,0,0.15,1),
                                 width 0.5s cubic-bezier(0.4,0,0.15,1),
                                 height 0.5s cubic-bezier(0.4,0,0.15,1)`;
      scene.style.left   = `${rect2.left}px`;
      scene.style.top    = `${rect2.top}px`;
      scene.style.width  = `${rect2.width}px`;
      scene.style.height = `${rect2.height}px`;

      inner.style.transition = 'transform 0.5s cubic-bezier(0.4,0,0.15,1)';
      inner.style.transform  = 'perspective(900px) rotateY(0deg)';

      // At flip midpoint: hide back, reveal front
      const backEl  = scene.querySelector('.card-back');
      const frontEl = scene.querySelector('.card-front');
      setTimeout(() => {
        if (backEl)  backEl.classList.add('face-hidden');
        if (frontEl) frontEl.classList.remove('face-hidden');
      }, 250);

      overlay.classList.remove('active');

      scene.addEventListener('transitionend', () => {
        scene.classList.remove('inspecting');
        scene.style.cssText = '';
        inner.style.cssText = '';
        // Ensure clean state: back hidden, front visible
        if (backEl)  backEl.classList.add('face-hidden');
        if (frontEl) frontEl.classList.remove('face-hidden');
        placeholder.replaceWith(scene);
        placeholder  = null;
        isInspecting = false;
        activeScene  = null;
      }, { once: true });
    }

    overlay.addEventListener('click', closeInspect);
  </script>
</body>
</html>
