<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px; height: 400px;
      display: flex; align-items: center; justify-content: center;
      background: #f0f0f0;
    }
  </style>
</head>
<body>
<svg width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <clipPath id="circle-clip">
      <circle cx="160" cy="160" r="154"/>
    </clipPath>
  </defs>

  <!-- Background: white circle with thin border -->
  <circle cx="160" cy="160" r="155" fill="white"/>
  <circle cx="160" cy="160" r="155" fill="none" stroke="#e8e8e8" stroke-width="3"/>

  <!-- Subtle red wash behind tick -->
  <circle cx="160" cy="140" r="95" fill="#b22222" opacity="0.06"/>

  <!-- ── Large checkmark ──
       Short left leg: from (80,155) to (125,200)
       Long right leg: from (125,200) to (240,80)
  -->
  <polyline
    points="72,152 122,202 248,76"
    fill="none"
    stroke="#b22222"
    stroke-width="28"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <g clip-path="url(#circle-clip)">
  <!-- white inner ring to frame the GWC text area at bottom -->
  <rect x="60" y="222" width="200" height="72" rx="6" fill="white"/>

  <!-- ── GWC text ── -->
  <text x="160" y="272" font-family="Montserrat, Arial, sans-serif" font-weight="900"
    font-size="52" fill="#1a1a1a" text-anchor="middle" letter-spacing="-2">GWC</text>

  <!-- red underline accent -->
  <rect x="100" y="278" width="120" height="4" rx="2" fill="#b22222"/>
  </g>

</svg>
</body>
</html>
