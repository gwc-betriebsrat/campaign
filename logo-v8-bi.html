<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWC Logo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    }

    .gwc-logo {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      user-select: none;
    }

    /* ── Acronym ─────────────────────────────────────────────────────── */
    .gwc-acronym {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -3px;
      color: #1a1a1a;
      line-height: 1;
    }
    .gwc-acronym .red { color: #b22222; }

    /* ── Rule ────────────────────────────────────────────────────────── */
    .gwc-rule {
      width: 100%;
      height: 3px;
      background: #b22222;
      border-radius: 2px;
    }

    /* ── Slogan ──────────────────────────────────────────────────────── */
    /*
      Structure: [static stem] + [animated: suffix + gap + keyword]
      EN: "Rea" + "l Voice" / "l Change" / "l Accountability"
      DE: "Echt" + "e Stimme" / "er Wandel" / "e Verantwortung"

      The animated chunk slides up from below as one unit.
      Gap is baked into the animated span via padding-left on .keyword.

      6 slots × 1.6 s = 9.6 s cycle.
      enter end = 3.125%  (0.3 s)
      hold  end = 13.542% (1.3 s)
      exit  end = 16.667% (1.6 s)
    */
    .gwc-slogan {
      margin-top: 8px;
      position: relative;
      height: 1.25em;
      overflow: hidden;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.25em;
      display: flex;
      align-items: center;
    }

    /* Static stem: "Rea" or "Echt" — switches every 4.8 s */
    .gwc-stem {
      color: #1a1a1a;
      position: relative;
      height: 1.25em;
      overflow: hidden;
      /* wide enough for "Echt" (4 chars) */
      min-width: 2.6em;
      flex-shrink: 0;
    }

    .gwc-stem span {
      position: absolute;
      left: 0;
      top: 0;
      line-height: 1.25em;
      opacity: 0;
      white-space: nowrap;
    }

    @keyframes stemIn {
      0%      { opacity: 0; }
      3.125%  { opacity: 1; }
      46.875% { opacity: 1; }
      50%     { opacity: 0; }
      50.1%   { opacity: 0; }
      100%    { opacity: 0; }
    }

    .gwc-stem .s-en { animation: stemIn 9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-stem .s-de { animation: stemIn 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }

    /* Animated track: each slot is "suffix + keyword" as one unit */
    .gwc-track {
      position: relative;
      height: 1.25em;
      overflow: hidden;
      /* wide enough for longest slot: "l Accountability" */
      width: 300px;
    }

    .gwc-slot {
      position: absolute;
      left: 0;
      top: 0;
      line-height: 1.25em;
      display: flex;
      align-items: center;
      opacity: 0;
      transform: translateY(100%);
      white-space: nowrap;
      color: #b22222;
    }

    /* suffix (the sliding letter) sits flush against the stem */
    .gwc-slot .suffix {
      /* no extra gap — visually continues the stem */
    }

    /* keyword gets a gap that varies per language */
    .gwc-slot .keyword {
      /* EN: tight gap, DE: wider gap — set per slot below */
    }

    /* EN slots: tight gap (0.22em) */
    .gwc-slot:nth-child(1) .keyword,
    .gwc-slot:nth-child(2) .keyword,
    .gwc-slot:nth-child(3) .keyword { padding-left: 0.22em; }

    /* DE slots: wider gap (0.32em) */
    .gwc-slot:nth-child(4) .keyword,
    .gwc-slot:nth-child(5) .keyword,
    .gwc-slot:nth-child(6) .keyword { padding-left: 0.32em; }

    @keyframes slotSlide {
      0%      { opacity: 0; transform: translateY(100%);  }
      3.125%  { opacity: 1; transform: translateY(0);     }
      13.542% { opacity: 1; transform: translateY(0);     }
      16.667% { opacity: 0; transform: translateY(-100%); }
      16.7%   { opacity: 0; transform: translateY(100%);  }
      100%    { opacity: 0; transform: translateY(100%);  }
    }

    .gwc-slot:nth-child(1) { animation: slotSlide 9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-slot:nth-child(2) { animation: slotSlide 9.6s cubic-bezier(0.22,1,0.36,1) 1.6s infinite; }
    .gwc-slot:nth-child(3) { animation: slotSlide 9.6s cubic-bezier(0.22,1,0.36,1) 3.2s infinite; }
    .gwc-slot:nth-child(4) { animation: slotSlide 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }
    .gwc-slot:nth-child(5) { animation: slotSlide 9.6s cubic-bezier(0.22,1,0.36,1) 6.4s infinite; }
    .gwc-slot:nth-child(6) { animation: slotSlide 9.6s cubic-bezier(0.22,1,0.36,1) 8.0s infinite; }

    /* ── Wordmark ────────────────────────────────────────────────────── */
    .gwc-wordmark {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .gwc-fullname {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #555;
    }

    .gwc-tagline {
      position: relative;
      height: 1.4em;
      overflow: hidden;
      font-size: 10px;
    }

    .gwc-tagline > span {
      position: absolute;
      left: 0;
      top: 0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #aaa;
      white-space: nowrap;
      line-height: 1.4em;
      opacity: 0;
    }

    @keyframes taglineIn {
      0%      { opacity: 0; }
      3.125%  { opacity: 1; }
      46.875% { opacity: 1; }
      50%     { opacity: 0; }
      50.1%   { opacity: 0; }
      100%    { opacity: 0; }
    }

    .gwc-tagline .t-en { animation: taglineIn 9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-tagline .t-de { animation: taglineIn 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }
  </style>
</head>
<body>

  <div class="gwc-logo">

    <div class="gwc-acronym"><span class="red">G</span>WC</div>
    <div class="gwc-rule"></div>

    <div class="gwc-slogan">
      <!-- Static stem switches EN↔DE every 4.8 s -->
      <div class="gwc-stem">
        <span class="s-en">Rea</span>
        <span class="s-de">Echt</span>
      </div>
      <!-- Animated track: suffix + keyword slide up as one unit -->
      <div class="gwc-track">
        <!-- EN -->
        <div class="gwc-slot"><span class="suffix">l</span><span class="keyword">Voice</span></div>
        <div class="gwc-slot"><span class="suffix">l</span><span class="keyword">Change</span></div>
        <div class="gwc-slot"><span class="suffix">l</span><span class="keyword">Accountability</span></div>
        <!-- DE -->
        <div class="gwc-slot"><span class="suffix">e</span><span class="keyword">Stimme</span></div>
        <div class="gwc-slot"><span class="suffix">er</span><span class="keyword">Wandel</span></div>
        <div class="gwc-slot"><span class="suffix">e</span><span class="keyword">Verantwortung</span></div>
      </div>
    </div>

    <div class="gwc-wordmark">
      <div class="gwc-fullname">Global Workforce Community</div>
      <div class="gwc-tagline">
        <span class="t-en">A Works Council That Acts for You</span>
        <span class="t-de">Ein Betriebsrat, der für dich handelt</span>
      </div>
    </div>

  </div>

</body>
</html>
