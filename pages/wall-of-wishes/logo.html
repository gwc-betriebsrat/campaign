<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWC – Wall of Wishes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      background: #fff;
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
      padding: 0;
      overflow: hidden;
    }

    .gwc-logo {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      user-select: none;
      padding: 8px 0 8px 0;
    }

    /* ── GWC acronym ─────────────────────────────────────────────── */
    .gwc-acronym {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -3px;
      color: #1a1a1a;
      line-height: 1;
      animation: fadeSlideDown 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .gwc-acronym .red { color: #b22222; }

    /* ── Red rule ────────────────────────────────────────────────── */
    .gwc-rule {
      width: 100%;
      height: 3px;
      background: #b22222;
      border-radius: 2px;
      margin-top: 4px;
      transform-origin: left center;
      animation: ruleExpand 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
    }

    /* ── Wall of Wishes title area ───────────────────────────────── */
    .gwc-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 10px;
      animation: fadeSlideDown 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.2s both;
    }

    /* Small decorative post-it pin */
    .gwc-pin {
      position: relative;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      margin-bottom: 4px;
    }
    .gwc-pin::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #b22222;
      box-shadow: 0 2px 6px rgba(178,34,34,0.4);
    }
    .gwc-pin::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
    }

    /* Handwritten "Wall of Wishes" */
    .gwc-wow-text {
      font-family: 'Caveat', cursive;
      font-size: 46px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
      letter-spacing: 0.5px;
      transform: rotate(-1.2deg);
      display: inline-block;
      position: relative;
    }

    /* Subtle underline squiggle */
    .gwc-wow-text::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, #b22222 0%, #e05555 50%, #b22222 100%);
      border-radius: 2px;
      opacity: 0.4;
      transform: rotate(0.5deg);
    }

    /* ── Wordmark ────────────────────────────────────────────────── */
    .gwc-wordmark {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      animation: fadeSlideDown 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.35s both;
    }

    .gwc-fullname {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #555;
    }

    .gwc-tagline {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #aaa;
    }

    /* ── Animations ──────────────────────────────────────────────── */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes ruleExpand {
      from { transform: scaleX(0); opacity: 0; }
      to   { transform: scaleX(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="gwc-logo">
    <div class="gwc-acronym"><span class="red">G</span>WC</div>
    <div class="gwc-rule"></div>
    <div class="gwc-title-row">
      <span class="gwc-pin"></span>
      <span class="gwc-wow-text">Wall of Wishes</span>
    </div>
    <div class="gwc-wordmark">
      <div class="gwc-fullname">Global Workforce Community</div>
      <div class="gwc-tagline">A Works Council That Stands for You</div>
    </div>
  </div>
</body>
</html>
