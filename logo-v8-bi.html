<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWC Logo v8 – Bilingual Split</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #fff;
      font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif;
    }

    .gwc-logo {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      user-select: none;
    }

    /* ── Top: GWC acronym ────────────────────────────────────────── */
    .gwc-acronym {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -3px;
      color: #1a1a1a;
      line-height: 1;
    }

    .gwc-acronym .red { color: #b22222; }

    /* ── Rule ────────────────────────────────────────────────────── */
    .gwc-rule {
      width: 100%;
      height: 3px;
      background: #b22222;
      border-radius: 2px;
    }

    /* ── Split slogan ────────────────────────────────────────────── */
    /*
      Each line is a row. "Real"/"Echte" slides in from the right,
      the word slides in from the left. They meet in the middle.
      On exit they split apart. The next word pair replaces them.
    */
    .gwc-slogan {
      margin-top: 8px;
      position: relative;
      height: 2em;
      width: 360px;
      overflow: hidden;
    }

    /* One pair = prefix + word, absolutely positioned */
    .gwc-pair {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
      opacity: 0;
    }

    .gwc-pair .real {
      color: #1a1a1a;
      transform: translateX(60px);
    }

    .gwc-pair .word {
      color: #b22222;
      transform: translateX(-60px);
    }

    /*
      6 pairs × 1.6 s each = 9.6 s cycle.
      Each pair: slide in (0.3 s), hold (1.0 s), split out (0.3 s).
      enter end  = 0.3/9.6 =  3.125%
      hold end   = 1.3/9.6 = 13.542%
      exit end   = 1.6/9.6 = 16.667%
    */
    @keyframes pairIn {
      0%      { opacity: 0; }
      1%      { opacity: 1; }
      3.125%  { opacity: 1; }
      13.542% { opacity: 1; }
      16.667% { opacity: 0; }
      16.7%   { opacity: 0; }
      100%    { opacity: 0; }
    }

    @keyframes realSplit {
      0%      { transform: translateX(60px);  }
      3.125%  { transform: translateX(0);     }
      13.542% { transform: translateX(0);     }
      16.667% { transform: translateX(60px);  }
      100%    { transform: translateX(60px);  }
    }

    @keyframes wordSplit {
      0%      { transform: translateX(-60px); }
      3.125%  { transform: translateX(0);     }
      13.542% { transform: translateX(0);     }
      16.667% { transform: translateX(-60px); }
      100%    { transform: translateX(-60px); }
    }

    /* EN pairs: 0 s, 1.6 s, 3.2 s — DE pairs: 4.8 s, 6.4 s, 8.0 s */
    .gwc-pair:nth-child(1) { animation: pairIn    9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-pair:nth-child(2) { animation: pairIn    9.6s cubic-bezier(0.22,1,0.36,1) 1.6s infinite; }
    .gwc-pair:nth-child(3) { animation: pairIn    9.6s cubic-bezier(0.22,1,0.36,1) 3.2s infinite; }
    .gwc-pair:nth-child(4) { animation: pairIn    9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }
    .gwc-pair:nth-child(5) { animation: pairIn    9.6s cubic-bezier(0.22,1,0.36,1) 6.4s infinite; }
    .gwc-pair:nth-child(6) { animation: pairIn    9.6s cubic-bezier(0.22,1,0.36,1) 8.0s infinite; }

    .gwc-pair:nth-child(1) .real { animation: realSplit 9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-pair:nth-child(2) .real { animation: realSplit 9.6s cubic-bezier(0.22,1,0.36,1) 1.6s infinite; }
    .gwc-pair:nth-child(3) .real { animation: realSplit 9.6s cubic-bezier(0.22,1,0.36,1) 3.2s infinite; }
    .gwc-pair:nth-child(4) .real { animation: realSplit 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }
    .gwc-pair:nth-child(5) .real { animation: realSplit 9.6s cubic-bezier(0.22,1,0.36,1) 6.4s infinite; }
    .gwc-pair:nth-child(6) .real { animation: realSplit 9.6s cubic-bezier(0.22,1,0.36,1) 8.0s infinite; }

    .gwc-pair:nth-child(1) .word { animation: wordSplit 9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-pair:nth-child(2) .word { animation: wordSplit 9.6s cubic-bezier(0.22,1,0.36,1) 1.6s infinite; }
    .gwc-pair:nth-child(3) .word { animation: wordSplit 9.6s cubic-bezier(0.22,1,0.36,1) 3.2s infinite; }
    .gwc-pair:nth-child(4) .word { animation: wordSplit 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }
    .gwc-pair:nth-child(5) .word { animation: wordSplit 9.6s cubic-bezier(0.22,1,0.36,1) 6.4s infinite; }
    .gwc-pair:nth-child(6) .word { animation: wordSplit 9.6s cubic-bezier(0.22,1,0.36,1) 8.0s infinite; }

    /* ── Wordmark ────────────────────────────────────────────────── */
    .gwc-wordmark {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .gwc-fullname {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: #555;
    }

    .gwc-tagline {
      position: relative;
      height: 1.4em;
      overflow: hidden;
      font-size: 10px;
    }

    .gwc-tagline > span {
      position: absolute;
      left: 0;
      top: 0;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #aaa;
      white-space: nowrap;
      line-height: 1.4em;
      opacity: 0;
    }

    /*
      Tagline stays in EN for first 4.8 s, DE for next 4.8 s.
      Uses same pairIn keyframe percentages but holds for 3 slots each.
      enter end = 3.125%, hold end = 50% - 3.125% = 46.875%, exit end = 50%
    */
    @keyframes taglineIn {
      0%      { opacity: 0; }
      3.125%  { opacity: 1; }
      46.875% { opacity: 1; }
      50%     { opacity: 0; }
      50.1%   { opacity: 0; }
      100%    { opacity: 0; }
    }

    .gwc-tagline .t-en { animation: taglineIn 9.6s cubic-bezier(0.22,1,0.36,1) 0.0s infinite; }
    .gwc-tagline .t-de { animation: taglineIn 9.6s cubic-bezier(0.22,1,0.36,1) 4.8s infinite; }
  </style>
</head>
<body>

  <div class="gwc-logo">

    <div class="gwc-acronym"><span class="red">G</span>WC</div>
    <div class="gwc-rule"></div>

    <div class="gwc-slogan">
      <div class="gwc-pair">
        <span class="real">Real</span>
        <span class="word">Voice</span>
      </div>
      <div class="gwc-pair">
        <span class="real">Real</span>
        <span class="word">Change</span>
      </div>
      <div class="gwc-pair">
        <span class="real">Real</span>
        <span class="word">Accountability</span>
      </div>
      <div class="gwc-pair">
        <span class="real">Echte</span>
        <span class="word">Stimme</span>
      </div>
      <div class="gwc-pair">
        <span class="real">Echter</span>
        <span class="word">Wandel</span>
      </div>
      <div class="gwc-pair">
        <span class="real">Echte</span>
        <span class="word">Verantwortung</span>
      </div>
    </div>

    <div class="gwc-wordmark">
      <div class="gwc-fullname">Global Workforce Community</div>
      <div class="gwc-tagline">
        <span class="t-en">A Works Council That Acts for You</span>
        <span class="t-de">Ein Betriebsrat, der für dich handelt</span>
      </div>
    </div>

  </div>

</body>
</html>
