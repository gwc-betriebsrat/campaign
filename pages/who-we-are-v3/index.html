<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GWC — Who We Are (v3)</title>
  <link rel="stylesheet" href="../../shared/_shared.css" />
  <style>
    /* ── Grid ─────────────────────────────────────────────────────────── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 20px;
    }

    /* ── Card scene: 3-D container ───────────────────────────────────── */
    .card-scene {
      aspect-ratio: 2 / 3;
    }

    /* ── Card inner: the thing that flips ────────────────────────────── */
    .card-inner {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.08s linear;
      will-change: transform;
      border-radius: 12px;
      cursor: pointer;
      background: transparent;
    }

    /* Hover lift */
    .card-scene:not(.inspecting):hover .card-inner {
      box-shadow: 0 24px 64px rgba(0,0,0,0.32), 0 0 32px rgba(178,34,34,0.2);
    }

    /* ── Front & Back shared ─────────────────────────────────────────── */
    .card-front, .card-back {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }

    /* ── FRONT ───────────────────────────────────────────────────────── */
    .card-front {
      background: #111;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }

    .card-front .card-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .card-front .card-initials {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.4rem;
      font-weight: 900;
      color: rgba(255,255,255,0.2);
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }

    .card-front .card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 28px 10px 10px;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
      pointer-events: none;
    }

    .card-front .card-name {
      font-size: 0.73rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }

    .card-front .card-role {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
      line-height: 1.3;
    }

    /* Holographic foil layer (front only) */
    .card-foil {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      mix-blend-mode: color-dodge;
      background: linear-gradient(
        calc(var(--angle, 135deg) + 90deg),
        rgba(255,0,128,0.16) 0%,
        rgba(255,165,0,0.11) 20%,
        rgba(255,255,0,0.11) 35%,
        rgba(0,255,128,0.11) 50%,
        rgba(0,128,255,0.13) 65%,
        rgba(128,0,255,0.11) 80%,
        rgba(255,0,128,0.16) 100%
      );
    }

    .card-scene:not(.inspecting):hover .card-foil,
    .card-scene.inspecting .card-foil {
      opacity: 1;
    }

    /* ── BACK ────────────────────────────────────────────────────────── */
    .card-back {
      transform: rotateY(180deg);
      background: linear-gradient(145deg, #fefefe 0%, #f5f0f0 100%);
      border: 1.5px solid rgba(178,34,34,0.2);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Back face hidden until flipped (JS toggles this) */
    .card-back.face-hidden,
    .card-front.face-hidden {
      visibility: hidden;
    }

    /* Back header strip */
    .card-back .back-header {
      background: var(--red);
      padding: 10px 12px 8px;
      flex-shrink: 0;
    }

    .card-back .back-name {
      font-size: 0.72rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.2;
    }

    .card-back .back-role {
      font-size: 0.58rem;
      color: rgba(255,255,255,0.75);
      margin-top: 2px;
      line-height: 1.3;
    }

    /* Back intro text */
    .card-back .back-intro {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      font-size: 0.62rem;
      color: #333;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      scrollbar-width: thin;
      scrollbar-color: rgba(178,34,34,0.3) transparent;
    }

    .card-back .back-intro::-webkit-scrollbar { width: 3px; }
    .card-back .back-intro::-webkit-scrollbar-thumb { background: rgba(178,34,34,0.3); border-radius: 2px; }

    /* Back footer link */
    .card-back .back-footer {
      padding: 6px 10px 8px;
      border-top: 1px solid rgba(178,34,34,0.12);
      flex-shrink: 0;
    }

    .card-back .back-link {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--red);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-back .back-link:hover { text-decoration: underline; }

    /* No-intro placeholder */
    .card-back .back-no-intro {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: var(--muted);
      font-style: italic;
      padding: 12px;
      text-align: center;
    }

    /* ── Placeholder: invisible box that holds grid space ───────────── */
    .card-placeholder {
      aspect-ratio: 2 / 3;
      visibility: hidden;
      pointer-events: none;
    }


    /* ── Inspect overlay ─────────────────────────────────────────────── */
    #inspect-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    #inspect-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

/* ── Inspected card: pulled out of flow, fixed on screen ─────────── */
    .card-scene.inspecting {
      position: fixed;
      z-index: 1001;
      cursor: pointer;
      background: transparent !important;
      aspect-ratio: unset;
      /* transition set by JS once positioned */
    }

    /* Hint */
    .tap-hint {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 20px;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div id="inspect-overlay"></div>

  <iframe class="gwc-logo-frame" src="../who-we-are/logo.html" title="GWC Logo" scrolling="no"></iframe>

  <div class="section">
    <h2 class="section-title">The Candidates</h2>
    <p class="story-para">A diverse team representing every corner of our global community.</p>
    <p class="tap-hint">Hover to see the shine · Click to inspect a card</p>
    <div class="cards-grid" id="cardsGrid"></div>
  </div>

  <script>
const INTROS = {
  "Daniel Calderon": "Hello, I'm Daniel Calderón Villela, a Honduran-American-German born in Tegucigalpa, Honduras. I've moved around a lot, living in 7 different countries of the Americas including 18 years in the United States, having short stints in Taiwan and China and now 7.5 years in Germany. Whilst in Germany I've been to 23 of the 27 EU countries. Through those travels I’ve aspired to find the similarities across the world's cultures while understanding the differences.\nI've been at Zalando for 7.5+ years, always on the same contract having been hired to work as a Privacy Engineer on Data Protection, a discipline in which I was specialized in with a masters from Carnegie Mellon University. I am currently assigned as an Application Security Engineer in Information Security. Privacy is a human right to me.\nI joined the 1st Works Council term as a substitute in Feb 2021, and became more active in the 2nd Works Council term from 2022-2026. Along with many partial contributions, I list a selected list of some of what I've championed and focused on this term:\nTaking on individual cases of employee hardship\nProtecting the Employee-friendly aspects of Hybrid Work, like championing the rejection of an Employer’s proposal to introduce an attendance dashboard, which was rejected.\nBringing privacy mindset to the Works Council in reviewing potentially privacy-invasive new IT, like negotiating the regulated use of the monitoring tool Palo Alto Cortex XDR (which alerts for abnormal behavior on company devices), and negotiating the introduction of the monitoring tool zScaler (which serves as a VPN replacement for ivanti)\nChampioning a more inclusive workplace by re-negotiating with the Employer the anti-discrimination processes at Zalando\nChampioning the introduction of a Petitions Process to simplify for employees the submission of legally valid employee petitions\nNegotiating and Delivering the Electronic Working Time Recording Works Agreements and Annexes\nNegotiating to make the major reorganizations in 2023 & 2026 proceed more justly\nI've learned a lot about organizing through this work, coming to see that organizing is needed to capture the democratic voice of the employees, & that the institutional power of the Works Council is needed to bring that voice to the table with Management. I want a works council that better reflects this need.\nI also see a need for a Works Council that truly reflects the current global workforce we have, and that champions its priorities. With nearly 1/3  of our workforce from Germany, and 2/3 not, we need a works council that works for every employee, wherever they may come from. A valid work contract defines participation and not any other criteria, so someone not from this country has a right to be included, and to feel that they belong and that someone like them is representing them. I want to help build a Works Council that succeeds in this representation.\nI speak English by training and US immersion, hablo español por mi crianza inmersa en el español latinoamericano, und ich versuche jetzt, mein Deutsch zu verbessern!",
  "Patrick Keenan": "Hallo everyone, my name is Patrick Keenan and I’ve been working at Zalando since December 2017; I am Irish but grew up in the UK, and here I am a Merchandise Planner currently working in the Streetwear Sneakers team; when I’m not at work neck-deep in Excel or trying to contend with Anaplan, you can probably find me posting memes or playing video games.\nI love working at Zalando, and one of the main reasons is the people; when I come to the office I always find myself surrounded by great people from all over the world, people from all kinds of backgrounds and experiences - I have made lifelong friends here, and I hope to continue making even more.\nAlthough I have always been passionate about fairness and standing up for people (you may have seen me in various Slidos asking difficult questions), I have decided to take a more active role in our workplace by standing with the Global Workforce Community, a diverse group of people that I believe represent the best of what our Zalando community can be - I want to empower and stand up for my fellow colleagues from every part of Zalando, because ultimately what makes Zalando a success is the people.\nI believe in fairness and transparency for all no matter what, and though I love working at Zalando it is a universal truth that companies do not always operate with their employees’ best interests at heart, but you can rest assured that I will do whatever it takes to speak out and stand up for what’s fair.",
  "Mosheera Salah": "My name is Mosheera Salah, and I joined Zalando in September 2023 as the Lead of ZTF PMO. My journey in project management began 21 years ago, leading me through diverse roles—from Head of PM Center of Excellence to Director of Global Operations for a major French firm.\nIn 2023, I sought a new horizon and moved to Germany to embrace the challenge of the tech industry. Beyond the spreadsheets and strategy, my true north is Fairness. I am a firm believer in being the voice for those who aren't heard and standing my ground when it comes to doing what is right. I am deeply dedicated to authentic Diversity and Inclusion—moving beyond metrics to create a reality where everyone truly belongs.\nWhen I’m not driving projects, you’ll find me at a pottery wheel or with an oil brush in hand, finding balance through art.",
  "Mahmoud Gaballah": "Mahmoud Gaballah - DRAFT\nIntroduction\n[PLEASE DO NOT USE BEFORE REVIEW BY Kim, Dan, and Wil]\nFrom Collective Begging to Collective Power\nThe Weight of Being Unheard I joined Zalando in 2020 as a Software Engineer, eager to contribute to a company that promised a culture of belonging. But over the last two years, that promise began to feel distant. As a core member of the Muslim employee community, I sat in rooms where colleagues shared stories of shrinking freedom, of feeling marginalized, and of a Diversity & Inclusion framework that looked good on paper but failed them in practice.\nI remember the feeling of \"collective begging\"—the exhaustion of asking for basic empathy and justice, only to find no echo in the company or the Works Council. It wasn't just a lack of policy; it was a lack of heart. Through that pain and despair, I realized something vital: We cannot wait for someone to give us our rights. We have to be the ones to grab them.\nBuilding a Shield: The D&I Committee When the opportunity arose to join the Works Council in 2025, I didn't just want a seat at the table; I wanted to change what the table was used for. I co-founded the Diversity & Inclusion Committee because I never wanted another colleague to feel the isolation I witnessed. Whether it’s supporting international employees navigating a foreign system, protecting colleagues with disabilities, or ensuring gender equity, I’ve made it my mission to turn \"corporate jargon\" into actual, lived protection.\nNegotiating for Your Dignity I believe a Works Council should be your shield, especially when you are most vulnerable. This is why I stepped into the room to negotiate our Internal Investigation Policy. I wasn't just checking boxes; I was fighting for you. I fought to ensure:\nPresumption of Innocence: No one should be judged before the facts are in.\nPrivacy First: Strict limits on data surveillance so you aren't treated like a suspect in your own workplace.\nA Friend in the Room: The absolute right to have Council representation by your side during interviews. You should never have to face a daunting process alone.\nVigilance Behind the Scenes Most of my work happens in the Personnel Committee, reviewing the files that decide your hiring, your transfers, and even your terminations. I know these aren't just \"files\"—they are your paychecks, your families, and your peace of mind. I approach every document with scrutiny and skepticism. I don’t take HR’s word as fact. I double-check with the people named in those files, bringing them the context they are often denied.\nRadical Transparency as a Promise I have been reprimanded by the employer and even by the Council for my commitment to transparency. They call it \"discretion,\" but I call it hiding the truth. Unless it is a strict business secret or private personal data, I believe knowledge is power. You deserve to know the facts of the situation you are in. I am here to end the era of filtered information.\nWhy Global Workforce Community? I joined this list of 70+ colleagues because we represent the true Zalando—every country, every ERG community, and every department, and every background. As we face the re-orgs of 2026, I am not here to \"manage your expectations.\" I am here to raise the bar.\nI’ve been the advocate in the room defending your interests when you didn’t even know I was there. I am ready to continue being that voice. Let’s move from reacting to leading.\nthe introduction ends here, Below is more photos to be used in future communication\nphotos to choose from that fits our manifest and values:",
  "Andrea Sella": "Bike trip in Netherlands\nI joined Zalando in May 2020, and since then, I have enjoyed tackling the complex engineering challenges inherent to our business. After several years in the Partner Tech department - where I helped partners integrate price, stock, and product  - I moved to PRSB and now Cloud Infrastructure organisations. There, I work alongside talented teams to provide tools for the wider software engineering community.\nI am a firm believer in taking full ownership and responsibility for my actions (and inactions) on a daily basis; it is through our mistakes that we grow into better humans, both personally and professionally. Because organizations and individuals are constantly evolving, we can only truly thrive by acknowledging this ever-shifting nature. I joined this list because such transitions must be navigated with both mind and heart. Only by ensuring just and fair treatment for our colleagues can we guarantee their and their families’ financial security.\nMy pronouns are they/them and you can address me with any variant of Andre*. If you would like to have a chat about what I do on a daily basis at work, feel free to book a slot.",
  "Kim Ozor": "Hi I’m Kim! Originally from the cursed state of Florida, I’ve been living in Europe since around 2012, and moved to Berlin to work at Zalando in 2017. I’m queer, chronically-ill, autistic, and disabled, and I have 2 dogs George (the blind one) and Milly (the elderly one) and a silly, mischievous cat named Alistair - all rescues.\nAt Zalando, I’ve been a fashion product developer in Private Labels, and a works council member since 2022. Sadly last autumn, my whole job family was discontinued. For years my colleagues and I speculated anxiously in whispers on when computers, AI, and outsourcing would take our jobs, with every new development inching us closer and closer to our expiration date. I think that’s unfortunately a common feeling in this time we live in. We see the world changing around us and feel helpless to stop it, helpless to influence it.\nIt’s more important now than ever to unite as workers, to band together in community, and to know who your friends are - who will stand up for you, and who will protect you when your job is on the chopping block. I joined Global Workforce Community because it’s the list with heart, the courage to do what’s right even when it’s hard, and the compassion to care for each and every worker.\nI like being a Works Council member because I like helping people. Over the past 4 years, I’ve helped many of you. I’m that phone-a-friend you call up whether you have a question or a crisis. My problem solving approach is that we try everything, every path- and when we run out of paths, we make our own path.\nMy biggest wins personally over the past term have been on individual cases - stopping the employer from stealing back someone’s bonus, extending the probation period for someone who was on long-term sick leave (they’re now a full employee by the way :)), establishing a fully dog-free allergy safe-zone in the office so that colleagues can work safely without ending up in the hospital. As Vice-chair of the petitions committee, I’ve been your champion petition facilitator (and at times petition ghost-writer). As chair of the D&I working group, I’ve led us in renegotiating the compliance policy, and investigating discriminatory practices\nLook, the world kinda really sucks right now. But if we unite and work together effectively, we can make the change that we want to see, in the workplace and in the world at large. Global Workforce Community is the list that will take us there.",
  "Bassma Elrafie": "Hey everyone! I'm Bassma (which, fun fact, means \"A smile\" in Arabic 😊). I'm an Egyptian 🇪🇬 who's called Berlin 🇩🇪 home for 11 awesome years and been part of the Zalando since 2017.\nI'm a Principal Tech Consultant in Zalando Tech Foundation, but let's be real ; my 15+ years in banking and e-commerce have really been about being a problem-solving ninja, innovation cheerleader, and the ultimate translator between tech and business. Basically, I make sure the job gets done (and funded!).\nYou know me from the Zalando SE works council. I've been a substitute member since 2022, soaking up legal knowledge and dedicating energy to the health committee to champion employee well-being. Plot twist: That means I come with zero ramp-up time and already have my priority list set for where we need urgent improvements.\nThis time, I'm aiming for a permanent seat because I'm ready to turn up the volume and dedicate all my energy to implementing the changes we need!\nWant the rest of the story? Keep scrolling... 😉\nI'm a proud mom to two awesome kids (13 and 6). I've navigated a career change, maternity leave, and even an employment gap. As a parent and a woman in tech, I've got the real-world playbook for what it takes to ensure every employee can enjoy well-being and pursue their career dreams without life's stages being roadblocks. I love mentoring and actively do it on various free platforms. My latest obsession? Customized gifting, think snow globes, tote bags, fun pens, and jewelry!",
  "Antonios Maronikolakis": "My name is Antonios, I am originally from Greece and I joined Zalando in October 2023 after finishing my PhD in Natural Language Processing. I am currently an Applied Scientist working in Search & Reco, and previously on the Zalando Assistant.\nI am a member of the Global Workforce Community because I believe in times of difficulty and uncertainty, both inside Zalando and globally, workers need to be more organised than ever. In order for the Works Council to actually be a trusted representative of Zalando employees, we need transparency, fairness and commitment to the struggle and the needs of workers. At the Global Workforce Community list we are uniting and standing together to fight for our collective rights.\nApart from work, you can find me reading, talking endlessly about football players from “back in my day” and going to demonstrations. If you are interested in any of the above or you want to have a chat, I would love to connect!",
  "Veda Maas": "Hello! I am Veda Maas!\nFor the past nine years, I have been an integral part of Zalando Private Labels, serving as a dedicated Quality Specialist since 2017. My career in quality assurance extends over 17 years, during which I have traveled extensively across numerous countries and visited countless factories. This unique experience has given me a deep, firsthand understanding of the profound and often troubling disparities in the treatment of workers between what we term the \"1st world\" and the \"3rd world.\" I have witnessed the impact of business decisions on the lives of people globally, which has fundamentally shaped my core values.\nMy background is rooted in South Africa, where I grew up during the final, turbulent years of Apartheid. While I benefited from the privilege of being a white South African, this upbringing instilled a fierce sense of responsibility in me. I very quickly realized that it is not enough to simply have privilege—it is my solemn duty to actively use that privilege as a tool to give back, to advocate for the voiceless, and to fight against systemic injustice. Growing up in that environment cultivated an enduring hatred of unfairness, injustice, and mistreatment of any human being.\nThis foundational moral compass is why I became involved in employee representation. I was part of the first Electoral Board at Zalando and have since served as a substitute on the Works Council (WoCo). I was heavily involved in the crucial Project Nova restructure, where I dedicated myself to negotiating better severance packages and terms for the affected employees. However, since those negotiations, I have grown increasingly disillusioned with how certain matters have been handled, feeling a sense of stagnation and a drift from the council's core mission. I've also become increasingly aware of what I perceive as a culture of superficiality and performatism, which is often characteristic of a rapidly evolving city like Berlin. This disillusionment is a primary motivator for me to step forward now, seeking a direct mandate to refocus our efforts.\nI am known for being a very straightforward, direct person. I operate with and strive for absolute honesty and transparency in all my interactions, and I consider these to be the non-negotiable, basic foundations for any effective Works Council.\nMy philosophy is simple and uncompromising: Our FIRST and ONLY mandate is to stand up and represent the employees—nothing more and nothing less. Our singular focus must be on the rights, welfare, and representation of every single person who works here. If elected, I will tirelessly work to ensure the WoCo operates with this clarity and conviction at all times.\nOn a personal note, I moved here to Berlin with my husband and our four beloved rescued dogs, who keep me grounded and remind me daily of the importance of care and loyalty. I look forward to the opportunity to bring my deep experience, unwavering integrity, and passionate commitment to fighting for what is right, to serve you on the Works Council.",
  "Larry Almeida": "Hi! I’m Larry.\nI’ve been a Software Engineer at Zalando since 2018. Over the last 7+ years, I’ve worked across a variety of teams and topics - from Site Reliability at Lounge to Sustainability and D&I. I’ve seen our culture from many angles, and I deeply care about the people who make this company run.\nWhy I’m here:\nI’m driven by mastery and adding value. I want to understand the labor laws, regulations, nuances around employer employee relationships and the Works Council so I can ensure they are applied effectively for myself and others.\nTransparency over Fluff: I want to make the WoCo more relatable and engaging for those of us who currently feel disconnected from it.\nKnowledge as Power: I want to translate employee representation complexities into actionable information for all of us.\nEffective Negotiation: I’m here to learn the mechanics of negotiation to ensure our collective voice is heard clearly.\nI haven't needed the Works Council’s help in the past, but I recognize that a strong council is a safety net for everyone. I want to contribute my analytical abilities and mindset to make that net stronger, more transparent, and more valuable for me and you.",
  "Ammad Nasir": "I am Ammad Nasir, born in Pakistan, raised in Islamabad, Copenhagen, London, Amsterdam and Berlin.\nAcademically, I am MBA (Master in Business Administration - Project Management) from Preston College London (United Kingdom), and MA. IMIS (International Management and Information Systems) from FH Südwestfalen, Germany.\nWith over 17 years of expertise in strategic procurement, contract negotiation, and supply chain management, I have a proven track record of delivering value across the fashion, automotive, industrial engineering, and telecommunications sectors. Since joining Zalando in October 2021, I have held pivotal roles within the Logistics organization. Currently, as a member of the Tender and Market Activities (TMA) team, my role is responsible for end-to-end Last Mile sourcing and contract management across different Zalando markets.\nWorking councils (WoCo) have pivotal roles in any big organisation in Germany. Myself as a member of the WoCo, I am sure that I will be strongly advocating for:\nDriving Radical Transparency in organisational decision making\nChampioning Diversity & Inclusion in day to day working environment\nProtecting and Developing Employee Rights\nProfessional & Personal Development Programs for employees\nTo pursue the collective goals, in the upcoming WoCo elections for 2026, I am part of the Global Workforce Community. As the name reflects, our Global Workforce Community reflects our dear and respectable colleagues from diverse nations, cultures, backgrounds, and experiences, yet we all are committed at large to the aforementioned goals.\nBy voting for the Global Workforce Community, you are electing a leadership team committed to being:\n\"Transparent by Design, Inclusive by Choice, Committed to You.\"",
  "Leonid Levitchi": "Senior Software Engineer. Originally from Moldova, I joined Zalando in 2023. While I am new to the Works Council topic, I am motivated to \"learn the ropes,\" gain a deeper understanding of our internal processes, and contribute wherever I can.\nI bring two core perspectives to the table that I believe are vital for our community:\nThe Family Perspective: As a parent, I understand that flexibility isn't just a luxury - it is a necessity for families to thrive in a modern workplace.\nAdvocating for Accessibility: Living with a small disability myself, I am committed to ensuring our workplace is truly inclusive and protective. I want to make sure no one is overlooked or left behind.\nI am fluent in Romanian, Russian, and English, and I’m also working on my German! 🇩🇪\n(Having grown up in Moldova - a cultural hub at the crossroads of different civilizations - I developed a deep appreciation for cultural diversity early on. My relocation to Germany has further enriched this cultural background, giving me a unique perspective on how different worlds can work together.)\nWhen I’m not at my desk, you’ll likely find me spending time with my family, gardening, cycling, or exploring museums. I’m also a fan of History and Sci-Fi literature, which helps me keep an eye on both the past and the future.",
  "Edgar Gomes Goncalves": "My name is Edgar. I’m originally from Portugal and have been with Zalando for nearly eight years, bridging the gap between Systems and Software Engineering.\nI am a firm believer in workers' rights. Over the years, I’ve seen firsthand how the Works Council is more than just a participant - it is a fundamental tool for leveraging our interests with the employer. I’m proud to be part of a list composed of kind, competent people from diverse backgrounds. Together, we offer the varied perspectives necessary for thoughtful decision-making and effective action.\nFeel free to reach out! As a Mental Health First Aider 🫶, I’m always here to support you with work-related concerns, but I’m also just as happy to chat about video games or board games.\nLooking forward to connecting!",
  "Hakkim Alavudeen": "Hello all,\nI’m Hakkim and I'm originally from Cape Town, South Africa. I have been with Zalando since 2020 as Head of Engineering, mainly in the Customer Facing Applications sphere.\nOver the past two years, I have come to appreciate how essential fair, transparent, and well-governed processes are within our company. During this period, my employment was terminated three times.\nOn 28 January 2026, the Berlin Labour Court ruled that all three terminations were invalid and ordered my reinstatement under unchanged contractual conditions. This experience reinforced my belief in the importance of strong institutional safeguards and accountability.\nI am interested in contributing to the Works Council to help uphold its core functions to the highest standards:\n• Safeguarding fairness in employment processes, incl. restructurings and \t\tperformance procedures.\n• Ensuring that employees who raise concerns are heard, protected and treated with integrity\n• Promoting transparency and accountability in decision-making.\n• Supporting constructive and solution-oriented dialogue between employees and management.\nOutside of work, you’ll most likely find me hiking or underwater — I’m an avid scuba diver and never happier than when I’m somewhere in nature. I bring the same energy to everything I do: stay calm, go deep, and don’t come up until the job is done.",
  "Abdelrahman Saleh": "Hi, I’m Abdelrahman. Originally from Egypt, I lived my childhood and grew up across other countries like Syria, Lebanon, Libya, and Saudi Arabia before joining Zalando as a Data Engineer in 2022.\nI moved to Germany with high expectations of fairness, transparency and freedom. My time here has taught me a vital lesson: these rights are not simply 'given', instead they are maintained and protected by those willing to stand up for them. I joined the Global Workforce Community to be a voice for my colleagues and to ensure no one has to fight for their rights alone.\nI believe our strength lies in unity. By looking beyond our individual needs and cooperating across our diverse backgrounds, we can build a workplace that truly benefits everyone.",
  "Marta Skarzynska": "Hi! I'm Marta. I’m originally from Poland (80s Solidarity!) and have been with Zalando for four years (including a one-year maternity leave). I moved to Germany nine years ago and am still enjoying the expat life—now in 'mum mode'.\nTransparency, equality, and respect are at the top of my list, and I believe there’s plenty of room for us to grow in these areas. Driven by empathy and curiosity, I want to be a positive force for change within WoCo and Zalando’s broader work culture.\nOn the personal side, I’m a total foodie, a jigsaw puzzle lover, an occasional traveler, and a cardio-endorphin enthusiast. I'd describe myself as a short-term realist and a long-term aspiring optimist. Looking forward to connecting with you all!",
  "Sabine Hopmann L\u00f3pez": "Hi everyone, I’m Sabine.\nMy background is a mix of cultures—born and raised in Nicaragua to a Nicaraguan mother and a German father. Since moving to Europe in 2009, I’ve lived across various German and European cities before settling in Berlin with my husband and two children. I joined Zalando in 2021 as a Senior Project Manager in Intralogistics and transitioned to ZEOS in 2023 as a Senior Integration Manager.\nI chose this list because of its genuine diversity and its focus on concrete initiatives over buzzwords. A perfect example is our push for reskilling programs. Technology changes fast, but an employee’s institutional knowledge is irreplaceable. We want to ensure that instead of losing talent, we provide the path for colleagues to pivot into new roles.\nWhile these are proposals and not yet guarantees, they represent exactly what this list stands for: real actions that protect our future.",
  "Selin Kozaneli": "My name is Selin Kozaneli.\nAs a Berlin native with Turkish roots and a proud mother of two, I bring both a local heart and a multicultural perspective to our team. Having spent over 8 years at Zalando, currently serving as a Senior Event Manager, I have seen our company grow and evolve from the inside out.\nI am running for the Works Council because I want to use my experience in organization and communication to ensure every voice is heard. My goal is to advocate for a fair, transparent workplace and to champion a better work-life balance for all of us. I am very glad to have joined the Global Workforce Community, as I believe my deep roots in the company, combined with my passion for people, will help me represent our interests effectively and make Zalando an even better place to work ❤️.",
  "Henrik Lenk": "Hi, I'm Henrik, working as a Junior Manager in the Customs Export Team since March 2020.\nI’m supporting the customs clearance processes & the operational business for exports and returns to / from non EU countries (CH,UK,NO).\nWhat motivated me to be part of the Works council?\nDuring the last 2 years I was often disappointed how Zalando is dealing with the ongoing world events and not taking a clear stance against clear injustice and favoring certain groups over others.\nI strongly oppose such behaviour and support equal rights for every employee.\nThat’s why I’d like to support employees with the same view as a works council member.",
  "Hala al Kuwatly": "I am Hala Al Kuwatly, a Syrian who moved to Germany more than 10 years ago. I joined Zalando in 2023 as an Applied Science Manager, leading the Applied science team in customer care.\nMy professional experience sits at the intersection of Software Engineering and Applied Science. I initially worked as a software engineer before pursuing my Master's degree in AI at the Technical University of Munich, which led me to specialize in AI and data science.\nOn a personal note, I am a relatively new mother to a very spirited and opinionated 18-month-old girl :)!",
  "Thorbj\u00f6rn Knappe": "Well, I'm not quite sure how to start this, but I think my name is a good beginning. So my name is Thorbjörn, though only my mom calls me that, and since the pronunciation can be a bit tricky, I go by my nickname TB.\nI've been with Zalando since 2011, working in IT across various departments over the years, starting in Internal IT, moving through Platform Engineering, and now having the privilege to work in the Infrastructure Services team.\nIT has been my passion from a very early age, and as they say, I have been fortunate enough to turn my hobby into my profession.\nI live with my family here in Berlin, the city where I was born and raised.\nWith young children at home, I can honestly say that my personal hobbies often take a backseat these days. However, I'm already enjoying sharing my love for building blocks and board games with the kids… though motorcycle riding will have to wait a bit longer :)\nTo be frank, I used to view voting and candidates as something \"obligatory that just had to be done.\" But now, with trusted colleagues by my side who took the time to explain what this is really all about, I am completely convinced that this can be something truly positive if we all work together as a community. Rather than just complaining at the end of the day, I want to take a stand and actually help make a difference. That's why I agreed to participate, and well, here I am.\nThank you for taking the time to read my introduction, and please feel free to reach out if you have any questions.\nAll the best to you all!",
  "Luc\u00eda Morales": "Hi! I’m Lucía (she/her). I’m from Spain and I’ve been working at Zalando since 2019. I started as a CuCa Specialist and my current role is Operations Specialist, so I’ve seen the company from different angles and realities.\nBeing involved in collective spaces has always been part of who I am. Between 2020 and 2024, I served as a member of the Works Council in CuCa International. It was a meaningful experience. We pushed for better standards, clearer protections. I was also a member of the Pride 🏳️‍🌈ERG in 2024, because representation and safe spaces inside the company matters to me just as much as formal agreements do. \n\nI’ve supported colleagues in conflicts, in uncertainty, in moments when they felt small against a big system. And what I’ve learned is this: most people need someone who listens, someone who explains their options, someone who stands next to them in the room.\n\nI’m running with Global Workforce Community, a diverse list of colleagues from different countries, backgrounds, and experiences. We reflect the reality of our workforce — and we believe that diversity is not only something to celebrate, but something that makes us stronger when we act together.",
  "Allam Abdel": "I believe ultimately in people, that's why I am here, so that we collectively as employees at Zalando make sure that we as people are put first whether as employees or customers. As of these hard times of the machine taking over humans we must come together to make sure as people that our value is determined fundamentally not by the amount of capital we generate nor the magnitude of production we deliver, but rather by the uniqueness of the decisions we make based on real empathy, emotions, and true human connection with people like us; by our ability to make decisions that put human lives, human values and prosperity first as the ultimate purpose before any other purpose, such as the concentration of power and wealth.\nMy name is Allam, which is my last name and what I like to be called, however on paper and due to bureaucracy in my home country Egypt, it's Mohamed Abdelkhalek.\nI will be honored to represent you in the works Council committee of 2026. Let's come together in these challenging times to make sure that AI will not take over our jobs today, our children's intelligence tomorrow, and eventually humanity.\nA little about me: I was born and grew up in a small coastal town by the red sea in Saudi Arabia called Yanbu. However I spent a similar amount of my life as a teenager and adult in the historical huge city of Cairo capital of Egypt that is culturally and socially rich, it greatly defined my character and refined my personality. And here I am for the past five rich years in the international city of Berlin, exploring the culture, from tech to techno, and from donor to art.",
  "Adrian Schiopu": "I am Adrian, born and raised in Romania, but spent most of my life working abroad in highly international and multicultural environments.\nI have joined Zalando in 2020 and ever since I’m working as a System Engineer within Zalando Workplace. \nI am happy to be part of the Global Workforce Community and to support our initiatives in making a positive difference in Zalando. \nEspecially close to my heart are the initiatives towards more transparency and equal opportunities as well as a reskilling program so much needed nowadays in this ever changing world.",
  "Valeriia Shcherbakova": "I’m Valeriia, originally from Kyiv 🇺🇦, and I’ve been part of the Lounge iOS team for almost four years now. During that time, I’ve worked in three different teams and setups, which gave me a pretty real understanding of how different working environments can feel — when they function well, and when they don’t.\nI’m running for the Works Council because I care about how we experience our work every day — not just what we deliver.\nWork-life balance, psychological safety, and feeling respected shouldn’t depend on luck, a specific manager, or how comfortable someone feels speaking up. They should be part of how we operate as a company. I know from personal experience how vulnerable it can feel to go through longer sick leave or difficult periods — especially when the signals around support aren’t always clear. That’s something I believe we can and should improve.\nTo me, the Works Council is about making sure people feel protected, heard, and treated fairly — not only when things are going well, but especially when they’re not.\nOutside of work, I’m a big yoga fan, a proud dog mom to Oggy (our unofficial BHS dog-friendly inspector 🐶), and yes — probably wearing pink more often than necessary 💗.\nI believe we can build an environment that is ambitious and high-performing, but also kind, clear, and supportive. If elected, I’ll focus on practical improvements, transparent communication, and making sure people don’t have to navigate difficult moments",
  "Casper Rutz": "Hey folks! I’m Casper (he/him or they/them) and I’ve been working at Zalando since 2021 as a Software Developer in Partner Tech (Zalando Direct). I’m from the USA – I was born and raised in Chicago, but lived in Utah a few years before escaping to Portland, Oregon. My partner and I moved to Berlin in 2021 with my partner and our two cats.\n\nWhy I’m running for the Works Council is a bit of a personal story, but one that I think it’s important to share. I am queer, and while I grew up in an awesome and largely queer-friendly city, I moved across the country to go to university in a part of the country that was deeply LGBT-unfriendly, where verbal abuse, systematic oppression, or even physical violence were common. I spent my entire time there terrified to be myself, and after I left I promised myself I would never hide who I am again and would do everything in my power to make sure no one has to go through something similar, no matter if they are queer or not.\n\nI’ve tried my best over the years to make good on that promise. I’ve been volunteering with the Pride@Zalando - LGBTQI+ ERG since 2022, most recently as a CORE member and Pillar co-lead. There’s a chance you might recognize me from a few videos and panel talks I’ve been featured in along the way. I admire my colleagues in the ERG and their mission to build acceptance and diversity at Zalando, and I’ve been able to connect with and learn from many people I otherwise wouldn’t ever see in my day-to-day.\n\nOver the years, it’s become clear to me that more solidarity among Zalandos would uplift all of us. Together we are stronger, and what helps the most vulnerable among us helps us all. I am proud to be standing in solidarity with the others on the Global Workforce Community list  running for the Works Council. I look forward to being able to represent you.",
  "Daniela Nigro": "Hello, Daniela Nigro here! A cheerful Italian by origin, who travelled across 40+ countries, and lived in 5 of them in the last 15years.\nIn this journey I connected with incredible human beings and experienced many different cultures, realising that real inclusion goes through the acknowledgment that we are all unique (rather than different), along with respect and empathy.\nI value open communication, I champion fairness, equity, and I firmly believe that honest conversations, build trust, drive impact and contribute to creating those safe spaces, also to disagree!\nI'm enthusiastic about people, cultures, languages, and food. Too boring? I love cooking, eating ( I am italian after all!), Improvisation theatre, dancing, skiing, and connecting people (did I say people already?)\nI joined Zalando over 4 years ago, in the Data Foundation dept, and beyond my role as Principal in the Product team,  you'll find me actively building connections and fostering communities, whether it's organizing events for the Italian community, or helping to bring together the data community by organizing the Zalando Data Connect, which successfully launched last year (and will repeat)! Another wide community I’ve recently committed to supporting is the “Community of Employees,” by serving as an active substitute member in the Electoral Board to assist with organizing this Works Council election.\nMy decision to run for the WoCo is driven by a commitment to support my colleagues and amplify the voices of those who may be hesitant to speak up for various reasons.  It also comes as a response to the difficult and ever changing global geopolitical situations, its impact on job market circumstances, and the uncertainties this bring to my fellows employees. I firmly believe that we shouldn’t just  “be thankful to have A job”, rather we should keep performing and enjoying our work life balance, without a pending threat that things can change for one moment to the other!\nThings can surely change, but timely information allows risk management, like in every well managed project!\nI joined the Global Workforce Community because it aligns with these principles, guided by genuine intent, passion, expertise, and a dedication to advocating for employees, learning from experience, and ensuring reliable support for the workforce as a whole, no matter where one is from, or which affinity groups they belong!\nFor that to happen, we need you tag along!;)  Come meet me and I’ll be happy to share more!",
  "Neelam Shehzadi": "I am Neelam Shehzadi, I joined Zalando in 2022 as Senior Software Engineer. I have an understanding of our company culture.\nMy experience, coupled with my decade-long international background, fuels my strong belief in equal opportunity and fairness, which is why I am eager to join the Works Council.\nMy goal is to dedicate my time to supporting my colleagues, ensuring everyone is aware of their rights, and promoting fair employment processes and equal opportunities for growth.\nNote\nPlease publish after the protection is \"on\".",
  "Nazrin Guliyeva": "My name is Nazrin Guliyeva, and I joined Zalando last May as a BI Analyst. I am originally from Baku, Azerbaijan, but I have been living in Germany for 8.5 years now.\nExperiences in my own path and of those around me, has given me a deep appreciation for the importance of standing up for one another. To me, professional integrity is deeply tied to how we show up for our peers and I believe that we are at our best when we look out for each other.\nBesides work, I love baking and trying out new restaurant in my free time 🙂",
  "Dawda Wally": "Hi, I’m Dawda Wally! I’ve spent the last four years as a Product Analyst at Zalando, though my professional journey has taken me through the worlds of software development, lab tech, and cybersecurity. I’m originally from The Gambia and hold a strong academic foundation in Computer Science and Information Technology. I’m driven by a curiosity for how things work; a trait that carries over into my personal life, where I spend my time gaming and watching sci-fi documentaries. If you want to talk data, cybersecurity, or the best episodes of Star Trek, let’s connect!",
  "\u00d6zg\u00fc Fidan": "Hello Zalando,\nThis is Özgü from Denizli, Turkey. I started working at Zalando in 2019 and since then I have been living in Berlin.\nI enjoy walks (now also with our dog) and running as long as the Berlin weather makes it enjoyable. Playing basketball and football along with watching my favorite team's games are among the things I enjoy from time to time.\nI find myself very lucky to have the chance to work in a multicultural environment with people from around the world. This brings me to the idea that diversity and differences should also be reflected in the work council.",
  "\u00d6m\u00fcr Yildirmaz": "Hi everyone! I'm Ömür, originally from Turkey. I've been part of Zalando since 2022, working as a Senior Software Engineer in the Data Platform department.\nI’m excited to support and contribute to the council by sharing my ideas and perspective, hoping to play a small role in continuing to make Zalando a fantastic place for all employees.",
  "Arun Yogeshwaran": "Hello everyone, I’m Arun. I joined Zalando in March 2025 as a Software Engineer, having moved from India. In this short time, I’ve seen how essential our international community is and how much strength we draw from it.\nAlthough I’m new to the Works Council related topics, I’m eager to learn quickly and gain the knowledge needed to be an effective advocate.\nLike many of my colleagues, I believe our workplace must guarantee fairness and protection not only when things are going well, but especially in challenging times.\nMy commitment to the Global Workforce Community is driven by a desire to champion transparency and fairness, by helping to build an environment where every employee understands their rights and where decisions are made openly and clearly, reflecting Mahmoud Gaballah’s call to end the era of filtered information.\nI also want to ensure that the Works Council truly reflects and advocates for the priorities of our global workforce. With two-thirds of our colleagues being non-German, it is crucial that every employee, regardless of background, feels seen, represented, and protected.\nI’m ready to step up and contribute my energy to our collective well-being. Feel free to reach out - I value honest dialogue and thoughtful, strategic conversations.",
  "Youssef Hussien": "My name is , I’m from Egypt and I joined Zalando’s Finance in 2024, I am a zBeat ambassador for O2C and FOP and I am looking forward to be part of Woco and have an ever bigger impact on Zalando’s growth.",
  "Frankie Thyer": "Hi! I’m Frankie (they/them), and I’ve been working at Zalando since 2021 as a software engineer, mostly focusing on accessibility and other diversity and inclusion topics. You might recognize me from my work with the Pride and Neurodiversity Employee Resource Groups (ERG’s), where I served as a core group member for 2 years. You might also have seen me on local Berlin stages performing as a drag king. I’m also a voting member of the Electoral Board, working to ensure a fair election, and bringing my experience to improve accessibility where possible and to prevent trans people from being outed by the election process.\nIn my experience, the most valuable thing Zalando has offered me is the opportunity to connect deeply with incredible people from all over the world. A colleague I met via the Pride ERG is about to be best man at my upcoming wedding! A few years ago, the ERG’s and D&I team helped me feel safe enough to come out as trans nonbinary at work.\nI learned the hard way that coming out at Zalando at that time wasn’t as safe and easy as I was led to believe. When things went wrong for me, the ERG’s could empathize and relate, but they lacked enough power to help. The Works Council, however, had real power to take action and put some things right.\nWhile I treasure all the connections I have made at Zalando, I’ve also witnessed deep structural problems and systems that continue to fail us and punish those who don’t fit a narrow template. Although the ERG’s are a wonderful tool for community building, I have seen the limits of what they have the power to accomplish to protect their members and make change.\nEveryone deserves to be treated with fairness and equal respect. I cannot in good conscience sit by and watch my colleagues continue to struggle without taking action myself to prevent it and to make sure it does not happen again.\nI am a member of the Global Workforce Community because it gathers people from all over the world with varying perspectives and shared values who have the courage and compassion to show solidarity and stand up for what’s right, even when it’s not easy or straightforward. I look forward to serving you!",
  "Yilmaz Baris Kaplan": "I am Yilmaz and I have been working in Zalando for 4.5 years as a software engineer. I am originally from south-east Turkey and moved to Germany for the first time to work at Zalando.\nI have also worked in both Dortmund and Berlin offices, currently in the Berlin office for 2 years.\nI personally believe in the beauty of diversity and that we are all parts of a connected humanity as humans.\nHappy to be part of the Global Workforce Community where everyone is being represented.",
  "Sanjeev Laha": "I am Sanjeev, currently I have been contributing to Zalando as a Senior Software Engineer  and I joined in 2016. A native of India, I have resided in Germany for over 14 years. My professional interests include engaging with democratic processes and advocating for the rights of the wider community. I am committed to maintaining absolute honesty and direct communication in all my professional interactions.",
  "Iber\u00ea Floriano Rios": "I am Iberê, originally from Brazil, I joined Zalando in 2016, worked in customer care tech for many years and recently moved into ZEOS.\nI worked as an engineering manager for 4 years and during that time, I tried to lead my team with full transparency. I'm a supporter of the open salaries initiative and hope for a future where we can understand decision making by leadership and which ways the collective rights are negotiated.\nI support the list goals of bringing as much transparency as possible to the Works Council negotiations and to work collectively for employees rights, not only through individual cases.",
  "Mathis Hagen": "Hi, I’m Mathis (he/him)!\nI am from Berlin and simply never left. Been with Zalando since 2017, first as a working student and full time after 2020, always in IT Security. I have come to love interacting with the people I worked with and met here and believe that this kind of international community is quite rare and precious.\nHaving experienced a couple reorganisations in the past, I have little hope that Zalando changes its approach and improves the communication towards employees leading up to a reorg. But we can change the WoCo in both the way it handles these situations and the transparency it displays toward us employees.\nI’d like for the WoCo to host more informational events. ⅔ of our colleagues are not from Germany and even the ones that are will likely not be fully familiar with their rights as employees in Germany specifically. I am very much included in that. But since the Woco receives legal training and education on these rights, I’d want the new WoCo to do a better job at sharing this knowledge.\nI’d love to see a WoCo that is more proactive and communicates better with its constituency and I think the Global Workforce Community is the best list to achieve this.",
  "Agustina Cadenas": "Hello everyone! I am Agustina (she/her)! I was born in Argentina, Buenos Aires. \nI joined Zalando 1.5 year ago, and I am part of the Size & Fit team.\nI decided to join the Work Force Community list after several conversations about our shared values. In a multinational company like ours, where we share our daily space with colleagues from all over the world, I believe our Works Council should reflect that reality.\nI want to be part of the list because I want to ensure real representation for all nationalities, backgrounds, religions and cultures. It is essential that we bring diverse perspectives to the table, especially for recent and sad geopolitical events that are happening around the world. We cannot ignore what is happening.\nWe all deserve to be treated equally and to have our voices represented.\nOn a more personal note, I am a woman of maaany hobbies. I’m a fashion designer, which means I’m obsessed with fabrics and sewing. I also like to swimming, making jewelry, or deep into some DIY craft project 😀\nI’m also trying to be active in the community. You can find me at soli parties, events, or demonstrations. So, if you ever need someone to join you at an event or want to organize something together — reach out to me :)\nI wish I can learn from everyone, and contribute with energy to make the things better.\nOutside Zalando, I’ll lik",
  "Jose Badilla": "Hi! My name is José Badilla and I’m originally from Panama City, Panama. However, I’ve been living in Germany for a bit over 7 years.\nI moved to Germany for work because the labor laws here are designed to treat you like a human being first and a worker second. In some other places, it can feel like you could be fired without warning just to save the company a few bucks. Here, the strict employee protections mean we should have real job security.\nThis peace of mind and stability is invaluable and should be defended by a strong WoCo. I am joining this list so I can be a participant in any actions that ensure we respect the dignity of every employee in the company, especially when it comes to restructuring and layoffs. I also look forward to ensuring our WoCo accurately represents and portrays the needs of the employee.",
  "Hesham Abdelhamid": "I came from Egypt to work as a software engineer in Zalando in 2018. I passed through multiple re-orgs and changed roles & teams several times. I am currently an engineering manager in the content engagement department. I think that the Works Council plays an important role in shaping and informing decisions both on individual & overall levels to ensure fairness especially during transitional and challenging times like the covid and post-covid era or the ongoing AI shift with its impacts. I also believe the WoCo should represent the diversity and different backgrounds of the people working in Zalando and should aim for protecting minorities from biases.\nImage downloadable from here too: https://drive.google.com/file/d/1UCjaI9HtlcNQku1qjtZ9WvRW7a89FYgB/view?usp=sharing",
  "Alexander Kraskov": "Hey, my name is Alex, originally from Russia, came to Berlin in 2009 as a part of the Spätaussideler family, and started my career in Zalando in 2012. Currently work as an engineering manager in a feature team.\nAs a foreigner who went through the entire process of integration, as a worker who observed Zalando growing from a startup to a big international company, as a former individual contributor and as a manager with 6+ years of experience, I would like to be able to help our fellow colleagues navigating the difficult waters of work life in Germany.",
  "Swastika Mishra": "My name is Swastika Mishra, and I was born in India. I joined Zalando July 2025 as a Senior Data Engineer.\nI am actively involved in the Global Workforce Community, a diverse network of colleagues from different countries, backgrounds, and experiences. This community reflects the richness of our global workforce, and we strongly believe that diversity is not only something to celebrate but also a source of strength. By working together and embracing our differences, we create a more inclusive, collaborative, and innovative environment.",
  "Katja Eikenberg": "Hi everyone! I'm Katja Eikenberg, and I've been a part of Zalando for over six years. My heart has always been in logistics, and I've had the pleasure of working across various parts of the company in that field with amazing people.\nI joined Zalando's Connected Retail in 2019. Inspired by the team, we rapidly onboarded store owners during the pandemic. Later, I led a Delivery Solutions team, managing final-mile deliveries across Nordics, Spain, France, Italy, UK, and Ireland. A late 2024 reorg shifted me to First/Mid-mile Process Excellence. Despite my last-mile focus, I embraced the change. My role's sudden redundancy, coupled with witnessing colleague disrespect, motivated my decision to run for the Works Council.\nStarting October 2024 I became an active part of the ZWN and took over responsibilities as CORE member being Pillar Lead for Advocacy. I led events like IWD25, Pink October initiatives and the Elephant in the room. I see the women in Zalando so active in the ZWN and we have an ambition to create and foster opportunities for the empowerment of women at Zalando and beyond. It makes me proud that I joined this community and supported this ERG.\nOutside of Zalando, you can find me spreading joy as a Zumba instructor! It's my purpose to bring happiness, relief, and a workout that uplifts our souls. This is the reason I am also part of the peer power program in Zalando, giving a class once a month to all my colleagues.\nThe WoCo and My Candidacy: The Motivation\nAs employees, we can feel vulnerable and often don't know our rights, which can differ so much between countries. I want to ensure all colleagues feel safe and supported, especially when hard times hit. I'm running because I genuinely want to see things change and bring more transparency for every single one of us. I'm ready to take this journey now and stand up for what's right, always keeping my colleagues' best interests in mind.\nSafeguarding Your Serenity: Stability and dignity are invaluable, especially during restructurings and layoffs. I want to be an active participant in ensuring we respect every employee.\nWisdom is Strength: I am committed to learning the complexities of labor laws and translating that employee representation information into clear, actionable knowledge for all of us.\nLess Talk, More Action: I want to make the WoCo more approachable and engaging, connecting it with those who currently feel disconnected.\nI love getting really good at things and making a difference, and I want to use that to make sure everyone has a respectful and good place to work.",
  "Mohamed Abouelezz": "My name is Mohamed Abouelezz, originally from Egypt, and I have been living in Germany for over nine years.\nThroughout my professional years in Germany, I have noticed a significant lack of awareness among expats regarding their rights and workplace expectations. This led me to personally prioritise deeply learning and understanding the system to ensure fair treatment, particularly given the instability of the job market that we have seen in recent years. I am committed to continuing this education and, more importantly, to sharing this crucial knowledge with others facing similar circumstances. My goal is to contribute and offer support wherever possible, which is why I am here as a part of the Global Workforce Community.",
  "M\u00edriam Sabat\u00e9": "Hello everyone,\nI’m Míriam Sabaté (she/her), originally from Barcelona, Spain.\nI’ve lived in Berlin for 11 years and have been working at Zalando since 2018, always in the same team: Ocean & Air Transports Team, navigating the complexities of logistics for Private Labels and Wholesale.\nThis experience has given me a front-row seat to the volatility of our industry. The reality is that the current geopolitical instability, the challenges of the retail and logistics industries, and the AI bubble affect Zalando and pose a risk to our jobs.\nHowever, my years at Zalando have taught me that we shouldn’t stay passive in the face of uncertainty. During my two and a half years as a zBeat Ambassador for the Transports Solutions Team, I learned how to drive bottom-up change, focusing on building a culture of engagement and ensuring our voices were heard when it mattered most. I want to take that same proactive energy to the Works Council.\nI’m excited to be part of the Global Workforce Community list and run for the WoCo:\nTo fight in your corner to ensure German labour law is respected and we advance our rights whenever possible.\nTo support everyone who needs us and ensure zero tolerance for discrimination.\nTo finally bring transparency to the WoCo processes, be receptive to your feedback and implement accountability and continuous improvement measures.\nI would be honoured to represent you and empower you in the next Works Council term.\nOn a personal level, I have a cat and I’m currently fostering another. I love Karaoke, crafts, sci-fi, fantasy and horror in any format and organising get togethers.\nFeel free to reach out to me or book a slot with me to discuss any topic that concerns you or simply give us feedback.",
  "Felipe Marin": "I am Felipe Marin, I have been working for Zalando for the past 8 years, working in IT Compliance, BI and Data topics. I am here because I really enjoyed the discussions with the group members and I am very in line with the cause regarding employees rights and fairness. Looking forward to meeting you all!",
  "Carla Figueiredo": "Hi, I’m Carla. Originally from Portugal, I’ve been a part of Zalando for nearly 4 years.\nMy work is driven by a deep belief in fairness and justice. For me, these aren't just words, they are the standard we should all expect in our workplace and life.\nThe Works Council is incredibly close to my heart because I believe every employee deserves a voice that is respected and protected.",
  "Anna Khoreva": "I'm Anna, originally from Russia, and I've been living in Germany since 2012. I joined Zalando in 2024 as the Head of Applied Science for the Size & Fit team.\nMy commitment to the working council is driven by a deep belief in our collective power. It's essential to me that we move beyond mere representation and actively ensure that every colleague's perspective is truly heard and translated into effective action.\nGlobal Workforce Community is a vibrant group of individuals—a true reflection of the many countries, backgrounds, and experiences that make up Zalando. I believe this diversity isn't just a characteristic; it's our greatest asset. By celebrating our differences and committing to open collaboration, we're building an environment that feels more inclusive, drives better ideas, and makes us all stronger.",
  "Wasim Sawalha": "Hi, I am Wasim Sawalha from Jordan , and I have been part of Zalando since 2018. Throughout these years, I have grown with the organization and today serve as Head of ERP Retail Solutions. But most important, I am simply a colleague,  someone who understands the challenges, ambitions, and everyday realities we all share.\nI joined the Global Workforce Community list because I believe our diversity is our strength,\nI believe representation is not just a responsibility,  it is a commitment. A commitment to listen. A commitment to speak up.\nI deeply believe in justice and equity for all. Not as abstract words, but as lived values. My motto is simple: “Justice for one is justice for all.” When one person is treated unfairly, it concerns all of us. When one voice is ignored, we all lose strength. But when we stand together, we build a culture of trust, dignity, and real inclusion.\nI will always advocate for open and respectful dialogue, fair decisions, and a supportive environment where each of us can thrive.\nTogether, we can shape a workplace built on trust, respect, and equal opportunity and we can ensure that every colleague feels valued, and empowered.",
  "Shubham Bansal": "Hello Lovely People,\nI am Shubham Bansal, originally from India. I have been a resident of Germany since 2011 and am now a German citizen.\nMy first tenure at Zalando was from 2014 to 2018. During this period, I witnessed the company's growth firsthand. However, I also personally experienced certain indirect challenges, or \"indifferences,\" and observed how they could impede an individual's professional development within a large corporate structure. Ultimately, these issues led to my earlier decision to leave the company.\nIn 2022, I returned to Zalando, taking on the role of Engineering Manager in the core platform team. Being in people leadership has given me insight into the various ups and downs, conflicts, and opinions that engineers face due to multiple challenges. I believe that my past experiences, combined with my current leadership perspective, uniquely position me to contribute significant value by elevating the company's foundation, which is inherently built on its people to the next level.",
  "Katyanna Moura": "Hello! I’m Katyanna (: I moved from Natal 🇧🇷, the \"Bride of the Sun\", to Berlin 8 years ago and have been a Software Engineer at Zalando for 4 years. I value fairness and transparency and want to help ensure fair treatment, real opportunities for career progression, and the most open communication possible.",
  "Alberto Perbellini": "Alberto Perbellini\n\nHi everyone! I'm Alberto Perbellini, originally from Italy, and I've been part of Zalando since June 2019 as a Senior Project Manager.\nI've always believed that if you want things to change, you have to show up and make it happen. Sitting on the sidelines and hoping for the best has never been my style — and honestly, it's a lesson I want to pass on to my kids too. That's what brought me to the Community: the conviction that active participation is the only real way to shape the environment around us, whether at work, at home, or in society.\nFairness and transparency aren't abstract ideals to me — they're the foundation of any place worth working at. I want to be part of a Works Council that earns the trust of every colleague by being honest, open, and genuinely accountable.\nOutside of work, you'll find me with a book in hand, out on a football pitch, or somewhere in the mountains recharging.",
  "Joe Tsui": "I’m Joe, from Hong Kong, and after nine years at Zalando, I’ve experienced both our greatest heights and our most stressful transitions. My journey included the \"scary\" moment of being dismissed during the 2018 zLabels closure and later losing out on fair compensation because frequent re-orgs \"reset\" my history with new leads. I want to ensure we stop paying the price for organizational changes we didn’t choose. I believe \"adaptability\" should never be used as an excuse to deny people fairness or career progression. As the company evolves, the people who built it must never be left behind or overlooked.",
  "Lara Laila G\u00e4rber": "Lara Laila Gärber\nMy name is Lara Laila Gärber (she/her) and I am Palestinian-German. I joined Zalando in the summer of 2025 as a Senior Diversity and Inclusion Manager.\nBefore that, I spent eight years at Anheuser-Busch InBev, the world’s largest brewer, where I worked across several functions and later led Diversity and Inclusion for Zone Europe and the Middle East. Two initiatives I am particularly proud of are extending the parental leave policy to more than 13,500 colleagues across 20 countries, and establishing the company’s first anti-harassment and anti-discrimination campaign, launched internally and in collaboration with nine other companies, including competitors.\nI care deeply about fairness and justice, which is why I am running with the Global Workforce Community. In today’s political climate, globally and in Germany, we are seeing heightened levels of racism, repression and fear. At moments like this, it becomes essential for us to unite.\nOutside of work, I dedicate time to initiatives that advance justice and freedom. Over the past years, I have moderated 17 panels and conducted 53 interviews with renowned organizers, activists, artists and lawyers working toward justice.\nOne lesson that has stayed with me is that each of us can contribute something different, sometimes even something small, but together the collective becomes powerful.\nI look forward to meeting many of you and would be happy to connect.",
  "MD Asaduzzaman": "Originally from Bangladesh, I joined the ZEOS team at Zalando in 2024 as a Backend Engineer. Outside of work, I am an avid sports enthusiast with a passion for cricket, football, table tennis, and badminton, and I always enjoy the strategic challenge of a game of chess\nI joined the Works Council because I believe every employee deserves a workplace where their voice truly matters. My goal is to focus on the \"people\" side of our work—ensuring policies like remote work, fair pay, and career growth are transparent and protect everyone equally.\nBy acting as a bridge between us and management, I can make sure our well-being and work-life balance remain a priority as the company grows. I am here to take our \"Act Like an Owner\" mindset and apply it to our workplace rights so we can all be proud of our culture",
  "Kevin Hobracht": "Heyo, \n\nMy name is Kevin. I joined Zalando in 2017 as a trainee and have stayed with the network team since 2020.\nGlad to be a member of the Global Workforce Community!",
  "Deepan Shanmugavel": "I am Deepan Shanmugavel, I come from Tamil Nadu, a southern state in India. I am a Queer person. I moved here with so many complexions within myself on self identification - the Zalando community and my wonderful ERG accepted me with an open hand. I am very grateful for that. Now it is my time to give back, hence I wanted to take part in the Work Council.\nI am currently working with ZEOS, I have several years of experience working in operational roles focusing on process improvement, collaboration across teams and supporting colleagues through change.\nWhat made me take part in the Work Council is I believe employees should have a strong and a fair voice in decisions that affect their daily work. I value open dialogue and constructive cooperation between employees and management.\nIf given the opportunity, I want to focus on listening to the colleague, understanding their concerns and helping ensure transparency and fairness in workplaces decisions. I would like to support initiatives that improve collaboration, working conditions and clarity in processes.\nMy goal is to contribute to a workplace where employees feel heard, respected and supported while also working together to find practical and sustainable solutions for the organization.",
  "Vijay Thakur": "My name is Vijay,  I am originally from India and have been working in Zalando's Infrastructure team since 2016. Seeing the recent geopolitical instability and the shifting landscape of the job market has deeply motivated me to get involved and offer my help, which is why I am so glad to be part of the Global Workforce Community.",
  "Nouman Ghaffar": "Nouman Ghaffar\n\nHello everyone,\nMy name is Nouman Ghaffar, and I have been working as a software engineer for the past ten years. Before joining Zalando, I had the opportunity to work in four different countries. I have now been with Zalando for nearly four years as a Senior Software Engineer.\nI strongly believe in equal opportunity and fairness in the workplace, which motivated me to join the Works Council. I believe it is important for everyone to be aware of their rights and to have equal opportunities and fair chances for growth.\nI will do my best to support, help, and contribute in any way I can.",
  "Ross Simpson": "Hi, I’m Ross - originally from Scotland and have been working at Zalando for over 7 years in various roles and living in Germany for over 17 years! I am really looking forward to supporting the Global Workforce Community and helping fellow colleagues navigate living and working in Germany!",
  "Zainab Khalil": "Hi,\nI’m Zainab and I’ve been with Zalando for 2 years as a Senior Product Analyst in WMS Logistics. Looking forward to supporting the Global Workforce Community.",
  "Minchul Ko": "Hi My name is Minchul\nI came from Korea and moved to Berlin with my wife and son ten years ago. I've been living in Berlin for ten years now. It's embarrassing to bring this up in my German class, but on the other hand, the fact that I've been working at Zalando for almost seven years is also an excuse for my German not improving. Haha\nI would like to deeply commit to creating a respectful work environment for all Zalando members. I will serve as a strong bridge, ensuring even the smallest voices from the field are heard and relayed to the company.\nAs a member of the Global Workforce Community, I will prioritize the rights and interests of my colleagues and act accordingly. Let's work together to create a healthier organizational culture.\nIf you see me at work or in the break room, please feel free to talk to me anytime!\nThank you",
  "Wilfredo Manrique": "Hi! My name is Wilfredo. You can call me Wil. I'm a tropically-grown eccentric from Caracas, Venezuela ☀️🌴. I’ve been a Software Engineer at Zalando since 2016 (back when our motto was \"Re-imagine Fashion for the Good of All\").\nI joined the Works Council in 2020 to support my colleagues with issues they face at work. Being together makes us strong!\nI believe effective representation requires a steady commitment to employee well-being and prioritizing the most vulnerable. My approach to WoCo work has and continues to be guided by the these authors:\nadrienne maree brown - Emergent Strategies\nAudre Lorde - Poetry is not a Luxury\nAlice Wong & Imani Barbarin - Disability visibility & accessibility\nMeenadchi - Trauma-informed, non-coercive communication\nI’m a big fan of J-Rock from the 80s (especially Visual-kei), and cozy games like Animal Crossing and Pokopia 🌱"
};
